name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - library: Nuke
            build_dir: libraries/Nuke
            test_dir: tests/Nuke.SimTests
            build_flags: ""
          - library: Stripe
            build_dir: libraries/Stripe
            test_dir: tests/Stripe.SimTests
            build_flags: "--all-products"
            build_passes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install workloads
        run: dotnet workload restore

      - name: Build xcframeworks
        run: |
          cd ${{ matrix.build_dir }}
          ./build-xcframework.sh ${{ matrix.build_flags }}

      - name: Resolve built products
        id: resolve
        run: |
          # Use the shared script's --resolve-products flag to get the exact product list
          # that matches what was built, avoiding duplicated parsing logic.
          PRODUCTS=$(scripts/build-xcframework.sh ${{ matrix.build_dir }} ${{ matrix.build_flags }} --resolve-products)
          echo "products<<EOF" >> $GITHUB_OUTPUT
          echo "$PRODUCTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate bindings and build libraries
        run: |
          PRODUCTS="${{ steps.resolve.outputs.products }}"
          PASSES=${{ matrix.build_passes || 1 }}

          for ((pass=1; pass<=PASSES; pass++)); do
            echo "=== Build pass $pass of $PASSES ==="

            while IFS='|' read -r dir csproj; do
              [ -z "$csproj" ] && continue

              BUILD_PATH="${{ matrix.build_dir }}"
              [ -n "$dir" ] && BUILD_PATH="$BUILD_PATH/$dir"

              # generate-bindings.sh runs only on pass 1; failures always fatal
              if [ "$pass" -eq 1 ]; then
                (cd "$BUILD_PATH" && ./generate-bindings.sh)
              fi

              # dotnet build: tolerate failures on non-final passes (wrapper compilation),
              # but always fail on the final pass
              if [ "$pass" -lt "$PASSES" ]; then
                dotnet build "$BUILD_PATH/$csproj" || echo "::warning::Pass $pass: $csproj build failed (expected for multi-pass)"
              else
                dotnet build "$BUILD_PATH/$csproj"
              fi
            done <<< "$PRODUCTS"
          done

      - name: Boot iOS Simulator
        id: boot-sim
        run: |
          # Find best available iPhone simulator
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          prefs = ['iPhone 16', 'iPhone 16 Pro', 'iPhone 15', 'iPhone 15 Pro']
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              for pref in prefs:
                  for d in devices:
                      if d['name'] == pref and d['state'] != 'Booted':
                          print(d['udid']); sys.exit(0)
          # Fallback: first available iPhone
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              for d in devices:
                  if 'iPhone' in d['name']:
                      print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          if [ -z "$DEVICE" ]; then
            echo "Error: No compatible iOS simulator found"
            exit 1
          fi
          echo "Booting simulator: $DEVICE"
          xcrun simctl boot "$DEVICE" 2>/dev/null || true  # tolerate already-booted
          xcrun simctl bootstatus "$DEVICE" -b
          echo "device_udid=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build test app
        run: |
          cd ${{ matrix.test_dir }}
          ./build-testapp.sh

      - name: Validate on simulator
        run: |
          cd ${{ matrix.test_dir }}
          ./validate-sim.sh 30 ${{ steps.boot-sim.outputs.device_udid }}
