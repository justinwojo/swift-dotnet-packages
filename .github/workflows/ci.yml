name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Detect which libraries need building ───────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for diff-based ListChangedLibraries

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      # Cache must come BEFORE `dotnet tool restore` so the restored
      # ~/.nuget/packages already contains nuke.globaltool on cache-hit
      # runs — otherwise tool restore re-downloads the tool every time
      # and only the post-restore steps benefit from the cache.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Nuke tool
        run: dotnet tool restore

      - name: Detect changed libraries
        id: detect
        run: |
          # Nuke writes its banner, target table, and "Build succeeded" line
          # to stdout, so `tail -n 1` would capture the success banner — not
          # the JSON. Grep for the matrix line by its leading `{"include":`
          # marker instead. ListChangedLibraries always emits exactly one
          # matrix line; if the regex matches zero or more than one we want
          # to fail loudly rather than silently set MATRIX to garbage.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MATRIX=$(dotnet nuke ListChangedLibraries --all --json \
              | grep -E '^\{"include":' | tail -n 1)
          else
            MATRIX=$(dotnet nuke ListChangedLibraries \
              --base-sha "${{ github.event.pull_request.base.sha }}" \
              --head-sha "${{ github.sha }}" \
              --json \
              | grep -E '^\{"include":' | tail -n 1)
          fi

          if [ -z "$MATRIX" ]; then
            echo "::error::ListChangedLibraries did not emit a matrix line — see preceding output"
            exit 1
          fi

          echo "Matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          # has_changes=false when the include[] array is empty
          if echo "$MATRIX" | grep -q '"include":\[\]'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Third-party library: build, test, and validate packaging ────────────────
  build:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - if: matrix.kind != 'third-party'
        run: echo "Skipping — not a third-party library" && exit 0

      - uses: actions/checkout@v4
        if: matrix.kind == 'third-party'

      # The macos-26 runner ships multiple Xcodes side-by-side. Default is
      # Xcode 26.2, but the .NET 10 iOS workload (26.2.10233+) requires
      # Xcode 26.3 — without this select, the test app build fails with
      # "This version of .NET for iOS requires Xcode 26.3". The package
      # itself targets net10.0-ios26.2 (the iOS SDK, not the build
      # toolchain), so building with Xcode 26.3 produces packages with
      # the same API surface.
      - name: Select Xcode 26.3
        if: matrix.kind == 'third-party'
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Ensure local NuGet source exists
        if: matrix.kind == 'third-party'
        run: mkdir -p local-packages

      - name: Setup .NET
        if: matrix.kind == 'third-party'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install workloads
        if: matrix.kind == 'third-party'
        run: dotnet workload install ios macos maccatalyst tvos

      - name: Cache NuGet packages
        if: matrix.kind == 'third-party'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Nuke tool
        if: matrix.kind == 'third-party'
        run: dotnet tool restore

      - name: Build library (xcframeworks + dependency injection + dotnet build)
        if: matrix.kind == 'third-party'
        run: dotnet nuke BuildLibrary --library "${{ matrix.library }}" --all-products

      - name: Validate packaging
        if: matrix.kind == 'third-party'
        run: dotnet nuke PackValidate --library "${{ matrix.library }}" --output "${{ runner.temp }}/ci-packages"

      - name: Build and validate on iOS Simulator
        if: matrix.kind == 'third-party'
        timeout-minutes: 20
        run: |
          dotnet nuke RunCiSimTest \
            --library "${{ matrix.library }}" \
            --timeout 60 \
            --step-timeout 1140 \
            --reuse-sim

      - name: Upload simulator diagnostics
        if: failure() && matrix.kind == 'third-party'
        uses: actions/upload-artifact@v4
        with:
          name: sim-diagnostics-${{ matrix.library }}
          path: /tmp/sim-diagnostics/
          retention-days: 7
          if-no-files-found: ignore

  # ── Apple framework: build, pack-validate, and sim test ───��────────────────
  apple-framework:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - if: matrix.kind != 'apple-framework'
        run: echo "Skipping — not an Apple framework" && exit 0

      - uses: actions/checkout@v4
        if: matrix.kind == 'apple-framework'

      # See note on the third-party build job above — Xcode 26.3 is
      # required by the .NET 10 iOS workload despite the runner default
      # being 26.2.
      - name: Select Xcode 26.3
        if: matrix.kind == 'apple-framework'
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Ensure local NuGet source exists
        if: matrix.kind == 'apple-framework'
        run: mkdir -p local-packages

      - name: Setup .NET
        if: matrix.kind == 'apple-framework'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install workloads
        if: matrix.kind == 'apple-framework'
        run: dotnet workload install ios macos maccatalyst tvos

      - name: Cache NuGet packages
        if: matrix.kind == 'apple-framework'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Nuke tool
        if: matrix.kind == 'apple-framework'
        run: dotnet tool restore

      - name: Build Apple framework
        if: matrix.kind == 'apple-framework'
        run: dotnet nuke BuildAppleFramework --library "${{ matrix.library }}"

      - name: Validate packaging
        if: matrix.kind == 'apple-framework'
        run: dotnet nuke PackValidateAppleFramework --library "${{ matrix.library }}" --output "${{ runner.temp }}/ci-packages"

      - name: Check for co-located test project
        if: matrix.kind == 'apple-framework'
        id: has_tests
        run: |
          # All tests are co-located: apple-frameworks/<Name>/tests/ for Apple
          # frameworks, libraries/<Name>/tests/ for third-party libraries.
          if [ -d "apple-frameworks/${{ matrix.library }}/tests" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No co-located test project for ${{ matrix.library }} — skipping sim validation"
          fi

      - name: Build and validate on iOS Simulator
        if: matrix.kind == 'apple-framework' && steps.has_tests.outputs.exists == 'true'
        timeout-minutes: 20
        run: |
          dotnet nuke RunCiSimTest \
            --library "${{ matrix.library }}" \
            --timeout 60 \
            --step-timeout 1140 \
            --reuse-sim

      - name: Upload simulator diagnostics
        if: failure() && matrix.kind == 'apple-framework' && steps.has_tests.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sim-diagnostics-${{ matrix.library }}
          path: /tmp/sim-diagnostics/
          retention-days: 7
          if-no-files-found: ignore
