name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26
    strategy:
      matrix:
        library: [Nuke]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install workloads
        run: dotnet workload restore

      - name: Build xcframework
        run: |
          cd libraries/${{ matrix.library }}
          ./build-xcframework.sh

      - name: Build library
        run: dotnet build libraries/${{ matrix.library }}

      - name: Boot iOS Simulator
        id: boot-sim
        run: |
          # Find best available iPhone simulator
          DEVICE=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          prefs = ['iPhone 16', 'iPhone 16 Pro', 'iPhone 15', 'iPhone 15 Pro']
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              for pref in prefs:
                  for d in devices:
                      if d['name'] == pref and d['state'] != 'Booted':
                          print(d['udid']); sys.exit(0)
          # Fallback: first available iPhone
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              for d in devices:
                  if 'iPhone' in d['name']:
                      print(d['udid']); sys.exit(0)
          sys.exit(1)
          ")
          if [ -z "$DEVICE" ]; then
            echo "Error: No compatible iOS simulator found"
            exit 1
          fi
          echo "Booting simulator: $DEVICE"
          xcrun simctl boot "$DEVICE" 2>/dev/null || true  # tolerate already-booted
          xcrun simctl bootstatus "$DEVICE" -b
          echo "device_udid=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build test app
        run: |
          cd tests/${{ matrix.library }}.SimTests
          ./build-testapp.sh

      - name: Validate on simulator
        run: |
          cd tests/${{ matrix.library }}.SimTests
          ./validate-sim.sh 30 ${{ steps.boot-sim.outputs.device_udid }}
