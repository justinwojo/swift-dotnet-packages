name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Detect which libraries need building ───────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for diff-based ListChangedLibraries

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Detect changed libraries
        id: detect
        run: |
          # Nuke writes its banner, target table, and "Build succeeded" line
          # to stdout, so `tail -n 1` would capture the success banner — not
          # the JSON. Grep for the matrix line by its leading `{"include":`
          # marker instead. ListChangedLibraries always emits exactly one
          # matrix line; if the regex matches zero or more than one we want
          # to fail loudly rather than silently set MATRIX to garbage.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MATRIX=$(./build.sh ListChangedLibraries --all --json \
              | grep -E '^\{"include":' | tail -n 1)
          else
            MATRIX=$(./build.sh ListChangedLibraries \
              --base-sha "${{ github.event.pull_request.base.sha }}" \
              --head-sha "${{ github.sha }}" \
              --json \
              | grep -E '^\{"include":' | tail -n 1)
          fi

          if [ -z "$MATRIX" ]; then
            echo "::error::ListChangedLibraries did not emit a matrix line — see preceding output"
            exit 1
          fi

          echo "Matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          # has_changes=false when the include[] array is empty
          if echo "$MATRIX" | grep -q '"include":\[\]'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build, test, and validate packaging ────────────────────────────────────
  build:
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure local NuGet source exists
        run: mkdir -p local-packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install workloads
        run: dotnet workload install ios

      - name: Build library (xcframeworks + dependency injection + dotnet build)
        run: ./build.sh BuildLibrary --library "${{ matrix.library }}" --all-products

      - name: Validate packaging
        run: ./build.sh PackValidate --library "${{ matrix.library }}" --output "${{ runner.temp }}/ci-packages"

      - name: Build and validate on iOS Simulator
        timeout-minutes: 20
        run: |
          ./build.sh RunCiSimTest \
            --library "${{ matrix.library }}" \
            --timeout 60 \
            --step-timeout 1140 \
            --reuse-sim

      - name: Upload simulator diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-diagnostics-${{ matrix.library }}
          path: /tmp/sim-diagnostics/
          retention-days: 7
          if-no-files-found: ignore
