name: Release

# Triggered by pushing a tag like "Nuke/12.8.0" or manually via workflow_dispatch.
# Tag-based runs build, test, pack, and publish to NuGet.
# Manual dispatch supports dry-run mode (build + pack without publish).

on:
  push:
    tags:
      - '*/[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Library/version to release (e.g., Nuke/12.8.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run — build and pack without publishing'
        type: boolean
        default: true

# For workflow_dispatch, github.ref_name is the branch (`main`) — not the tag
# we're publishing. Without `inputs.tag` taking precedence here, every
# workflow_dispatch run collapses to group `release-main` and GHA's queue
# semantics cancel pending runs when newer ones arrive (cancel-in-progress
# only protects the in-progress slot, not pending). For tag-push events
# `inputs.tag` is empty and ref_name is the tag (e.g. `WeatherKit/26.2.0`),
# so the fallback handles that case correctly.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Job 1: Build, test, and pack ─────────────────────────────────────────────
  build:
    runs-on: macos-26
    outputs:
      library: ${{ steps.parse.outputs.library }}
      version: ${{ steps.parse.outputs.version }}
      dry_run: ${{ steps.parse.outputs.dry_run }}
    steps:
      - name: Parse and validate tag
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            DRY_RUN="false"
          fi

          # Strict semver validation (mirrors release.yml:50 in pre-Session-4)
          if ! echo "$TAG" | grep -qE '^[A-Za-z0-9._-]+/[0-9]+\.[0-9]+\.[0-9]+([-+].*)?$'; then
            echo "::error::Invalid tag format: $TAG (expected <Library>/<semver>, e.g. Nuke/12.8.0)"
            exit 1
          fi

          LIBRARY="${TAG%%/[0-9]*}"
          VERSION="${TAG#*/}"

          # All three outputs MUST be emitted in this single step — the
          # publish job's `if: needs.build.outputs.dry_run != 'true'` gate
          # depends on dry_run being a real step output, not a literal.
          echo "library=$LIBRARY" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "## Release"
            echo "- **Library:** $LIBRARY"
            echo "- **Version:** $VERSION"
            echo "- **Dry run:** $DRY_RUN"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v4

      # The macos-26 runner ships multiple Xcodes side-by-side. Default is
      # Xcode 26.2, but the .NET 10 iOS workload (26.2.10233+) requires
      # Xcode 26.3 — without this select, the test app build fails with
      # "This version of .NET for iOS requires Xcode 26.3". The package
      # itself targets net10.0-ios26.2 (the iOS SDK, not the build
      # toolchain), so building with Xcode 26.3 produces packages with
      # the same API surface.
      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Ensure local NuGet source exists
        run: mkdir -p local-packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Install workloads
        run: dotnet workload install ios macos maccatalyst tvos

      # Cache must come BEFORE `dotnet tool restore` so the restored
      # ~/.nuget/packages already contains nuke.globaltool on cache-hit
      # runs — otherwise tool restore re-downloads the tool every time
      # and only the post-restore steps benefit from the cache.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Nuke tool
        run: dotnet tool restore

      - name: Build, pack, and write release manifest
        id: pack
        run: |
          dotnet nuke BuildAndPackRelease \
            --library "${{ steps.parse.outputs.library }}" \
            --version "${{ steps.parse.outputs.version }}" \
            --output "${{ runner.temp }}/packages" \
            ${{ steps.parse.outputs.dry_run == 'true' && '--dry-run' || '' }}

      # Note: RunCiSimTest below builds the test app at -c Debug, which
      # transitively rebuilds the library .csproj files at Debug (the test
      # app references them via <ProjectReference>). This is wasted work
      # relative to the Release build BuildAndPackRelease just produced —
      # but the test app has always validated Debug binaries (matches the
      # pre-Session-4 release flow), and the .nupkg files are already on
      # disk and will be uploaded as-is regardless of what RunCiSimTest
      # rebuilds. Optimizing this is tracked as a follow-up; for now,
      # the Release artifacts and the simulator validation are independent.
      - name: Build and validate on iOS Simulator
        timeout-minutes: 20
        run: |
          dotnet nuke RunCiSimTest \
            --library "${{ steps.parse.outputs.library }}" \
            --timeout 60 \
            --step-timeout 1140 \
            --reuse-sim

      - name: Upload simulator diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sim-diagnostics-${{ steps.parse.outputs.library }}-${{ steps.parse.outputs.version }}
          path: /tmp/sim-diagnostics/
          retention-days: 7
          if-no-files-found: ignore

      # Summarize + upload run whenever the pack step succeeded, even if a
      # later step (e.g. the sim test) failed. Without the explicit if:
      # gate, GHA's default skip-on-failure behavior strands the .nupkg
      # on the runner and we can't grab it for inspection — particularly
      # frustrating during dry-runs where flaky sim infrastructure
      # shouldn't block artifact retrieval.
      - name: Summarize packed packages
        if: steps.pack.outcome == 'success'
        run: |
          {
            echo ""
            echo "### Packages"
            for pkg in "${{ runner.temp }}/packages"/*.nupkg; do
              [ -f "$pkg" ] || continue
              echo "- \`$(basename "$pkg")\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload package artifacts
        if: steps.pack.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.parse.outputs.library }}-${{ steps.parse.outputs.version }}
          path: ${{ runner.temp }}/packages/
          retention-days: 30

  # ── Job 2: Publish to NuGet ──────────────────────────────────────────────────
  # Runs on ubuntu-latest in the `nuget-publish` environment so the
  # NUGET_API_KEY secret is never exposed to the macOS build job and an
  # approval gate can be enforced before publishing.
  publish:
    needs: build
    if: needs.build.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    environment: nuget-publish
    steps:
      - uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages-${{ needs.build.outputs.library }}-${{ needs.build.outputs.version }}
          path: packages/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      # Cache must come BEFORE `dotnet tool restore` so the restored
      # ~/.nuget/packages already contains nuke.globaltool on cache-hit
      # runs — otherwise tool restore re-downloads the tool every time
      # and only the post-restore steps benefit from the cache.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '.config/dotnet-tools.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore Nuke tool
        run: dotnet tool restore

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuke PublishRelease \
            --packages-dir packages \
            --nuget-api-key "$NUGET_API_KEY"

          {
            echo ""
            echo "### Published to NuGet"
            echo "- **Library:** ${{ needs.build.outputs.library }}"
            echo "- **Version:** ${{ needs.build.outputs.version }}"
            for pkg in packages/*.nupkg; do
              [ -f "$pkg" ] || continue
              echo "- \`$(basename "$pkg")\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
